apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: internal
  namespace: traefik
spec:
  gatewayClassName: traefik
  listeners:
    - name: https
      protocol: HTTPS
      port: 443
      hostname: "*.homelab.olav.ninja"
      tls:
        mode: Terminate
      allowedRoutes:
        namespaces:
          from: All
