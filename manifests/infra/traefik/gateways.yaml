apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: internal
  namespace: traefik
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt
spec:
  gatewayClassName: traefik
  listeners:
    - name: https
      protocol: HTTPS
      port: 443
      hostname: "*.homelab.olav.ninja"
      tls:
        mode: Terminate
        certificateRefs:
          - name: gateway-wildcard-tls-certificate
      allowedRoutes:
        namespaces:
          from: All
