apiVersion: gateway.networking.k8s.io/v1beta1
kind: HTTPRoute
metadata:
  name: llm-proxy
  labels:
    app.kubernetes.io/instance: llm-proxy
    app.kubernetes.io/name: llm-proxy
spec:
  parentRefs:
  - name: internal
    namespace: traefik
  hostnames:
  - llm-proxy.homelab.olav.ninja
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /
    backendRefs:
    - name: llm-proxy
      port: 8080
    filters:
    - type: ExtensionRef
      extensionRef:
        group: traefik.io
        kind: Middleware
        name: sablier
